# .github/workflows/ci.yaml
name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          # FIX 1: Changed to match the secret you created
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # FIX 2: Changed to match the secret you created
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # FIX 3: Changed to match the secret you created
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/preview-app:latest