# .github/workflows/pr_preview.yaml
name: PR Preview Environment

# This workflow triggers when a pull request is opened, reopened, or synchronized (new commits pushed).
on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository code from the PR branch.
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up kubectl. This action installs the kubectl command-line tool.
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      # Step 3: Log in to the Kubernetes cluster.
      # We are using a Kubeconfig file stored as a secret. We will create this next.
      - name: Login to Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          kubectl config get-contexts

      # Step 4: Dynamically set the namespace and image tag.
      # This is the core logic! We create a unique name for our environment.
      # github.head_ref is the name of the branch being merged (e.g., 'feature-a').
      - name: Set environment variables
        run: |
          BRANCH_NAME=$(echo ${{ github.head_ref }} | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "KUBE_NAMESPACE=pr-${BRANCH_NAME}" >> $GITHUB_ENV
          echo "DOCKER_IMAGE_TAG=${{ secrets.DOCKERHUB_USERNAME }}/preview-app:${BRANCH_NAME}" >> $GITHUB_ENV
          echo "Branch Name: ${BRANCH_NAME}"
          
      # Step 5: Build and push a branch-specific Docker image.
      # This is similar to our CI workflow, but it uses the unique branch tag.
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE_TAG }}

      # Step 6: Deploy to Kubernetes.
      # We use kubectl to apply our manifests, but we dynamically modify them first.
      - name: Deploy to Kubernetes
        run: |
          # Create a new namespace if it doesn't exist.
          kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          
          # Use 'sed' to replace placeholders in our manifests with the dynamic values.
          sed -i "s|walnuts2000/preview-app|${{ env.DOCKER_IMAGE_TAG }}|g" k8s/deployment.yaml
          sed -i "s|manual-k8s-deploy|${{ github.head_ref }}|g" k8s/deployment.yaml

          echo "--- Applying Deployment ---"
          cat k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml -n ${{ env.KUBE_NAMESPACE }}

          echo "--- Applying Service ---"
          cat k8s/service.yaml
          kubectl apply -f k8s/service.yaml -n ${{ env.KUBE_NAMESPACE }}