name: PR Preview Environment (Minikube via SSH)

# Déclenchement à chaque Pull Request
on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      #########################################################
      # 1. Checkout code du PR
      #########################################################
      - name: Checkout Repository
        uses: actions/checkout@v4

      #########################################################
      # 2. Préparer nom unique de l'environnement
      #########################################################
      - name: Generate Environment Variables
        run: |
          BRANCH_NAME=$(echo "${{ github.head_ref }}" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "NAMESPACE=pr-$BRANCH_NAME" >> $GITHUB_ENV

      #########################################################
      # 3. Copier projet vers machine locale via SSH
      #########################################################
      - name: Copy project to local machine
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LOCAL_HOST }}
          username: ${{ secrets.LOCAL_USER }}
          key: ${{ secrets.LOCAL_SSH_KEY }}
          source: "."
          target: "/home/${{ secrets.LOCAL_USER }}/preview/${{ env.BRANCH_NAME }}"

      #########################################################
      # 4. Connexion SSH + Déploiement dans Minikube
      #########################################################
      - name: Deploy to Minikube
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LOCAL_HOST }}
          username: ${{ secrets.LOCAL_USER }}
          key: ${{ secrets.LOCAL_SSH_KEY }}
          script: |

            echo "=== Go to project ==="
            cd /home/${{ secrets.LOCAL_USER }}/preview/${{ env.BRANCH_NAME }}

            echo "=== Start Minikube if stopped ==="
            minikube start

            echo "=== Use Minikube Docker daemon ==="
            eval $(minikube docker-env)

            echo "=== Build Docker Image inside Minikube ==="
            docker build -t preview-app:${{ env.BRANCH_NAME }} .

            echo "=== Create Namespace ==="
            kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

            echo "=== Replace Image in Deployment ==="
            sed -i "s|preview-app:latest|preview-app:${{ env.BRANCH_NAME }}|g" k8s/deployment.yaml

            echo "=== Deploy App ==="
            kubectl apply -f k8s/deployment.yaml -n ${{ env.NAMESPACE }}
            kubectl apply -f k8s/service.yaml -n ${{ env.NAMESPACE }}

            echo "=== Verify Pods ==="
            kubectl get all -n ${{ env.NAMESPACE }}

            echo "=== Preview URL ==="
            minikube service my-service -n ${{ env.NAMESPACE }} --url
